<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620" font-family="'Segoe Print', 'Comic Sans MS', cursive">

  <!-- LEFT: Collapsed view -->
  <!-- View toggle buttons -->
  <rect x="40" y="30" width="140" height="50" rx="8" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="62" font-size="16" fill="#333">Date Lab</text>
  <text x="55" y="78" font-size="12" fill="#333">Centric View</text>

  <rect x="195" y="30" width="140" height="50" rx="8" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="215" y="62" font-size="16" fill="#333">Bad Results</text>
  <text x="240" y="78" font-size="12" fill="#333">View</text>

  <!-- Session cards (collapsed) -->
  <rect x="40" y="110" width="420" height="80" rx="12" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="120" y="158" font-size="20" fill="#333">Lab, date, # biomarkers</text>

  <rect x="40" y="210" width="420" height="80" rx="12" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="120" y="258" font-size="20" fill="#333">Lab, date, # biomarkers</text>

  <rect x="40" y="310" width="420" height="80" rx="12" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="120" y="358" font-size="20" fill="#333">Lab, date, # biomarkers</text>

  <rect x="40" y="410" width="420" height="80" rx="12" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="120" y="458" font-size="20" fill="#333">Lab, date, # biomarkers</text>

  <!-- Title left -->
  <text x="60" y="570" font-size="48" fill="#333" font-weight="bold">Results Panel</text>

  <!-- RIGHT: Expanded view -->
  <!-- View toggle buttons -->
  <rect x="560" y="30" width="140" height="50" rx="8" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="580" y="62" font-size="16" fill="#333">Date Lab</text>
  <text x="575" y="78" font-size="12" fill="#333">Centric View</text>

  <rect x="715" y="30" width="140" height="50" rx="8" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="735" y="62" font-size="16" fill="#333">Bad Results</text>
  <text x="760" y="78" font-size="12" fill="#333">View</text>

  <!-- Expanded session with biomarker entries -->
  <rect x="580" y="100" width="420" height="400" rx="12" fill="none" stroke="#333" stroke-width="1.5"/>

  <rect x="610" y="130" width="360" height="70" rx="8" fill="none" stroke="#333" stroke-width="1.2"/>
  <text x="730" y="172" text-anchor="middle" font-size="16" fill="#333">Biomarker Entry</text>

  <rect x="610" y="220" width="360" height="70" rx="8" fill="none" stroke="#333" stroke-width="1.2"/>
  <text x="730" y="262" text-anchor="middle" font-size="16" fill="#333">Biomarker Entry</text>

  <rect x="610" y="310" width="360" height="70" rx="8" fill="none" stroke="#333" stroke-width="1.2"/>
  <text x="730" y="352" text-anchor="middle" font-size="16" fill="#333">Biomarker Entry</text>

  <rect x="610" y="400" width="360" height="70" rx="8" fill="none" stroke="#333" stroke-width="1.2"/>
  <text x="730" y="442" text-anchor="middle" font-size="16" fill="#333">Biomarker Entry</text>

  <!-- Title right -->
  <text x="580" y="570" font-size="48" fill="#333" font-weight="bold">Results Panel</text>

  <!-- Labels -->
  <text x="160" y="20" font-size="14" fill="#999" font-style="italic">Collapsed</text>
  <text x="700" y="20" font-size="14" fill="#999" font-style="italic">Expanded</text>
</svg>
