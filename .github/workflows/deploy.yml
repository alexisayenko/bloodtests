name: Deploy to GitHub Pages

on:
  push:
    branches: [main, devel]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout devel
        uses: actions/checkout@v4
        with:
          ref: devel
          path: devel
        continue-on-error: true

      - name: Build site
        run: |
          mkdir -p _site/dev
          # Copy main to root (exclude .git and .github)
          rsync -a --exclude='.git' --exclude='.github' main/ _site/
          # Copy devel to /dev/ subfolder
          if [ -d devel ]; then
            rsync -a --exclude='.git' --exclude='.github' devel/ _site/dev/
          fi
          ls -la _site/
          ls -la _site/dev/ || echo "No dev folder"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
