name: Deploy to GitHub Pages

on:
  push:
    branches: [main, devel]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          path: main

      - name: Checkout devel
        uses: actions/checkout@v5
        with:
          ref: devel
          path: devel
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Build site
        run: |
          mkdir -p _site/dev
          BUILD_NUM=${{ github.run_number }}

          # --- Main branch (vanilla HTML for now) ---
          rsync -a --exclude='.git' --exclude='.github' --exclude='frontend' --exclude='node_modules' main/ _site/
          cd main
          M_COMMIT=$(git log -1 --format="%h")
          M_DATETIME=$(git log -1 --format="%ci" | cut -c1-16)
          cd ..
          sed -i "s/<!--BUILD_INFO-->/build ${BUILD_NUM} · ${M_COMMIT} · ${M_DATETIME}/" _site/index.html

          # --- Devel branch (React app) ---
          if [ -d devel/frontend ]; then
            cd devel
            D_COMMIT=$(git log -1 --format="%h")
            D_DATETIME=$(git log -1 --format="%ci" | cut -c1-16)
            cd frontend
            npm ci
            BUILD_INFO="build ${BUILD_NUM} · ${D_COMMIT} · ${D_DATETIME}" npm run build
            cd ../..
            rsync -a devel/frontend/dist/ _site/dev/
          elif [ -d devel ]; then
            rsync -a --exclude='.git' --exclude='.github' --exclude='frontend' --exclude='node_modules' devel/ _site/dev/
            cd devel
            D_COMMIT=$(git log -1 --format="%h")
            D_DATETIME=$(git log -1 --format="%ci" | cut -c1-16)
            cd ..
            sed -i "s/<!--BUILD_INFO-->/build ${BUILD_NUM} · ${D_COMMIT} · ${D_DATETIME}/" _site/dev/index.html
          fi

          ls -la _site/
          ls -la _site/dev/ || echo "No dev folder"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
